name: crest
description: "Crest — a free, offline charting app for the symptothermal method. No account, no ads, no predictions."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.4
  intl: ^0.20.2
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.5
  csv: ^6.0.0
  file_picker: ^8.3.7
  share_plus: ^10.1.4
  table_calendar: ^3.2.0
  uuid: ^4.5.1
  web: ^1.1.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#F3ECE0"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#F3ECE0"
    theme_color: "#2B4A3E"
